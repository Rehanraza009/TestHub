<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam - Online Examination System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .exam-container {
            max-width: 100%;
        }
        
        .exam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            color: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 25px;
        }
        
        .camera-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 200px;
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            z-index: 1000;
        }
        
        .camera-container h4 {
            color: #1e40af;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        
        #cameraVideo {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }
        
        .warning-banner {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .warning-banner span {
            font-size: 1.5rem;
        }
        
        .fullscreen-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .fullscreen-warning h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        .fullscreen-warning button {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
        }
    </style>
</head>
<body class="centered-page">
    <div id="fullscreenWarning" class="fullscreen-warning" style="display: none;">
        <h2>⚠️ Please Enter Fullscreen Mode</h2>
        <p>You must be in fullscreen mode to take the exam</p>
        <button onclick="enterFullscreen()">Enter Fullscreen</button>
    </div>
    
    <div class="camera-container" id="cameraContainer" style="display: none;">
        <h4>📷 Proctoring</h4>
        <video id="cameraVideo" autoplay playsinline muted></video>
    </div>
    
    <div class="container exam-container">
        <div class="warning-banner">
            <span>⚠️</span>
            <div>
                <strong>Exam Mode Active</strong><br>
                Do not switch tabs or leave fullscreen mode
            </div>
        </div>
        
        <div class="exam-header">
            <h2>Exam in Progress</h2>
            <div class="timer" id="timer">⏱️ 10:00</div>
        </div>
        
        <main>
            <div id="questionsContainer"></div>
            <div class="exam-nav">
                <div class="exam-nav-buttons">
                    <button class="secondary" onclick="previousQuestion()">⬅️ Previous</button>
                    <button class="secondary" onclick="nextQuestion()">Next ➡️</button>
                </div>
                <button onclick="submitExam()">Submit Exam</button>
            </div>
        </main>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/exam.js"></script>
</body>
</html>
